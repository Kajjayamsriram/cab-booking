<!-- driver-dashboard.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Driver Dashboard - SafeRide</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css">
    <style>
        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .online-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        
        .toggle-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        .toggle-on {
            background: #28a745;
            color: white;
        }
        
        .toggle-off {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <div class="dashboard-header">
            <div class="row">
                <div class="col-md-8">
                    <h2><i class="fas fa-id-card"></i> Driver Dashboard</h2>
                    <p>Welcome back, John Doe</p>
                </div>
                <div class="col-md-4 text-end">
                    <h4>Rating: 4.8 ★</h4>
                </div>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="fas fa-chart-line fa-3x" style="color: #ff6b35;"></i>
                    <h3 class="mt-2">₹<span th:text="${earnings}">0</span></h3>
                    <p>Today's Earnings</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="fas fa-tasks fa-3x" style="color: #28a745;"></i>
                    <h3 class="mt-2"><span th:text="${rides.size()}">0</span></h3>
                    <p>Today's Rides</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <i class="fas fa-star fa-3x" style="color: #ffc107;"></i>
                    <h3 class="mt-2">4.8</h3>
                    <p>Rating</p>
                </div>
            </div>
        </div>
        
        <div class="online-toggle">
            <button class="toggle-btn toggle-on" id="availabilityToggle">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </div>
    
    <script>
        $('#availabilityToggle').click(function() {
            $.post('/driver/toggle-availability', {driverId: 1}, function() {
                location.reload();
            });
        });
    </script>
</body>
</html>
